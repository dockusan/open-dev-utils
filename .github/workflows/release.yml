name: "Build & Release"

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"
            args: "--target universal-apple-darwin"
          - platform: "windows-latest"
            args: ""
          - platform: "ubuntu-22.04"
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: install frontend dependencies
        run: npm install

      - uses: tauri-apps/tauri-action@v0
        id: tauri
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ startsWith(github.ref, 'refs/tags/v') && 'v__VERSION__' || '' }}
          releaseName: "OpenDevUtils v__VERSION__"
          releaseBody: "See the assets below to download the latest version of OpenDevUtils."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: opendevutils-${{ matrix.platform }}
          path: |
            src-tauri/target/${{ matrix.platform == 'macos-latest' && 'universal-apple-darwin/' || '' }}release/bundle/msi/*.msi
            src-tauri/target/${{ matrix.platform == 'macos-latest' && 'universal-apple-darwin/' || '' }}release/bundle/setup.exe
            src-tauri/target/${{ matrix.platform == 'macos-latest' && 'universal-apple-darwin/' || '' }}release/bundle/dmg/*.dmg
            src-tauri/target/${{ matrix.platform == 'macos-latest' && 'universal-apple-darwin/' || '' }}release/bundle/appimage/*.AppImage
            src-tauri/target/${{ matrix.platform == 'macos-latest' && 'universal-apple-darwin/' || '' }}release/bundle/deb/*.deb
          if-no-files-found: warn
